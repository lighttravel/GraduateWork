[platformio]
default_envs = esp32-s3-n16r8
description = ESP32-S3 voice assistant with WakeNet + iFlytek ASR/TTS + DeepSeek chat

[env:esp32-s3-n16r8]
platform = espressif32
board = esp32-s3-n16r8
framework = espidf

board_build.sdkconfig = sdkconfig.esp32-s3-n16r8
board_build.partitions = partitions.csv
board_build.flash_size = 16MB
board_build.flash_mode = qio

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D LOG_LOCAL_LEVEL=ESP_LOG_INFO
    -I src
    -I src/app
    -I src/config
    -I src/bsp/audio
    -I src/bsp/bus
    -I src/services/audio
    -I src/services/cloud
    -I src/services/network
    -I src/services/speech

lib_deps =
