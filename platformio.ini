; PlatformIO Project Configuration for ESP32 AI Voice Assistant (XiaoZhi Edition)
;   ESP32 + ES8311 Audio Codec
;   灏忔櫤AI鏂规: ESP-SR + WebSocket + xiaozhi-esp32-server
;   绂荤嚎鍞ら啋 + 鍦ㄧ嚎ASR + 鏈嶅姟鍣ㄧLLM/TTS
;
; 鏀归€犺鏄?
;   1. 绉婚櫎Deepgram/DeepSeek瀹㈡埛绔唬鐮?
;   2. 娣诲姞ESP-SR绂荤嚎鍞ら啋璇嶆娴?
;   3. 娣诲姞WebSocket瀹㈡埛绔繛鎺ュ埌xiaozhi-esp32-server
;   4. 绠€鍖栦负绾煶棰戞祦浼犺緭锛孉SR/LLM/TTS鐢辨湇鍔″櫒澶勭悊
;   5. 浼樺寲Flash浣跨敤鍜孨VS鍒嗗尯

[platformio]
; 榛樿鐜
default_envs = esp32-s3-n16r8
; 椤圭洰鎻忚堪
description = ESP32 AI Voice Assistant (XiaoZhi Edition)
; 寮哄埗UTF-8缂栫爜锛堣В鍐充腑鏂囪矾寰勯棶棰橈級

; ===========================================
; ESP32-S3 鐜閰嶇疆 (淇濈暀鐢ㄤ簬鏈潵鍗囩骇)
; ===========================================
[env:esp32-s3-devkitc-1]
; 骞冲彴鍜屽紑鍙戞澘
platform = espressif32
board = esp32-s3-devkitc-1

; 妗嗘灦閫夋嫨
framework = espidf

; 缂栬瘧閫夐」
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D LOG_LOCAL_LEVEL=ESP_LOG_INFO
    ; 澶存枃浠跺寘鍚矾寰?
    -I src
    -I src/drivers
    -I src/middleware
    -I src/modules

; 涓插彛鐩戣鍣ㄩ厤缃?
monitor_filters = esp32_exception_decoder
monitor_speed = 115200

; 涓婁紶閫夐」
upload_port = COM*  ; Windows
; upload_port = /dev/ttyUSB*  ; Linux
; upload_port = /dev/tty.usbserial*  ; macOS

; ===========================================
; ESP32 閫氱敤閰嶇疆 (瀹為檯浣跨敤鐨勭‖浠?- 灏忔櫤AI鏂规)
; ===========================================
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf

; 淇Flash澶у皬妫€娴嬮敊璇?(瀹為檯纭欢鏄?MB)
board_build.flash_size = 2MB
board_build.flash_mode = dio

; 浣跨敤浼樺寲鐨勫垎鍖鸿〃
board_build.partitions = partitions.csv

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; 缂栬瘧閫夐」
build_flags =
    ; 澶存枃浠跺寘鍚矾寰?
    -I src
    -I src/drivers
    -I src/middleware
    -I src/modules
    ; 浼樺寲閫夐」锛氫紭鍖栧ぇ灏?(-Os) 鑰岄潪閫熷害 (-O1)
    -Os
    ; 鍚敤閾炬帴鏃朵紭鍖?(LTO) - 鍙噺灏?10-20% 澶у皬
    # LTO disabled
    ; 璋冭瘯杈撳嚭绾у埆锛堣皟璇曟椂鍚敤锛?
    -D CORE_DEBUG_LEVEL=3
    -D LOG_LOCAL_LEVEL=ESP_LOG_INFO

; ===========================================
; ESP32-S3 (WROOM) 閫氱敤閰嶇疆
; ===========================================
[env:esp32-s3-generic]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

; 浣跨敤浼樺寲鐨勫垎鍖鸿〃
board_build.partitions = partitions.csv

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_flags =
    ${env:esp32-s3-devkitc-1.build_flags}

; ===========================================
; ESP32-S3 (甯lash) 閰嶇疆
; ===========================================
[env:esp32-s3-wflash]
; 甯﹀閮‵lash鐨凟SP32-S3閰嶇疆
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

; Flash閰嶇疆閫夐」
board_build.f_flash = 8000000L
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi

; 鍒嗗尯琛?- 浣跨敤灏忔櫤AI浼樺寲鍒嗗尯琛?
board_build.partitions = partitions.csv

monitor_speed = 115200
build_flags =
    ${env:esp32-s3-devkitc-1.build_flags}

; ===========================================
; 搴撲緷璧?
; ===========================================
[env:esp32-s3-n16r8]
platform = espressif32
board = esp32-s3-n16r8
framework = espidf

board_build.sdkconfig = sdkconfig.esp32-s3-n16r8
board_build.partitions = partitions.csv
board_build.flash_size = 16MB
board_build.flash_mode = qio

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_flags =
    ${env:esp32-s3-devkitc-1.build_flags}

; Diagnostic environment does not require extra Arduino libraries
lib_deps =

[env]
; ESP-IDF缁勪欢渚濊禆
lib_deps =
    ; JSON搴?- 鐢ㄤ簬API鍝嶅簲瑙ｆ瀽
    bblanchon/ArduinoJson@^6.21.0

; ===========================================
; 楂樼骇閰嶇疆閫夐」
; ===========================================

; 璋冭瘯閰嶇疆
; debug_tool = esp-prog
; debug_init_break = tbreak setup

; OTA閰嶇疆 (鍙€?
; upload_protocol = espota
; upload_port = 192.168.1.1

; 鏂囦欢绯荤粺閰嶇疆
; board_build.filesystem = littlefs
; board_build.partitions = huge_app.csv

